name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v5

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content "package.json" | ConvertFrom-Json).version
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "package.json version is missing"
          }

          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Validate pushed tag matches app version
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          if ("${{ github.ref_name }}" -ne "${{ steps.version.outputs.tag }}") {
            throw "Git tag ${{ github.ref_name }} does not match package.json version tag ${{ steps.version.outputs.tag }}"
          }

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Clean stale bundle artifacts
        shell: pwsh
        run: |
          if (Test-Path "src-tauri/target/release/bundle") {
            Remove-Item "src-tauri/target/release/bundle" -Recurse -Force
          }

      - name: Install dependencies
        run: bun install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: Cortex METAGEN - V${{ steps.version.outputs.version }}
          releaseBody: Signed desktop release published by GitHub Actions.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          tauriScript: bun tauri
          args: --target x86_64-pc-windows-msvc
